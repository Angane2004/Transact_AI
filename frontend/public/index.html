<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransactAI - AI-Powered Personal Finance Manager</title>
    <meta name="description" content="Automatic transaction categorization and spending insights powered by AI">
    <meta name="keywords" content="finance, transactions, AI, categorization, spending, budget">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://transact-ai-fawn.vercel.app/">
    <meta property="og:title" content="TransactAI - AI-Powered Personal Finance Manager">
    <meta property="og:description" content="Automatic transaction categorization and spending insights powered by AI">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="TransactAI - AI-Powered Personal Finance Manager">
    <meta property="twitter:description" content="Automatic transaction categorization and spending insights powered by AI">
    
    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Theme -->
    <meta name="theme-color" content="#1e40af">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }
        
        .logo {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            background: linear-gradient(45deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
            padding: 0.5rem 1rem;
        }
        
        .title {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            opacity: 0.9;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            margin: 2rem 0;
        }
        
        .feature {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1rem;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }
        
        .feature:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        
        .cta-button {
            background: linear-gradient(45deg, #1e40af, #3b82f6);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 2rem;
        }
        
        .cta-button:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(59, 130, 246, 0.4);
        }
        
        @media (max-width: 768px) {
            .features {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">TransactAI</div>
        <div class="title">AI-Powered Personal Finance Manager</div>
        
        <div class="features">
            <div class="feature">
                <h3>📱 Real-time SMS</h3>
                <p>Automatic transaction categorization from SMS notifications</p>
            </div>
            
            <div class="feature">
                <h3>🤖 Smart Analytics</h3>
                <p>AI-powered spending insights and trends</p>
            </div>
            
            <div class="feature">
                <h3>🔒 Secure & Private</h3>
                <p>Your data stays on your device, encrypted and safe</p>
            </div>
        </div>
        
        <button class="cta-button" onclick="window.location.href='/dashboard'">
            Get Started →
        </button>
    </div>
    
    <script>
        // Redirect to app after 3 seconds
        setTimeout(() => {
            window.location.href = '/dashboard';
        }, 3000);
    </script>
</body>
</html>
