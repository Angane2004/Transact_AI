services:
  - type: web
    name: transact-ai-backend
    env: python
    buildCommand: pip install -r requirements_render.txt
    startCommand: gunicorn -w 1 -k uvicorn.workers.UvicornWorker api.main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SKIP_ML_LOAD
        value: "true"
