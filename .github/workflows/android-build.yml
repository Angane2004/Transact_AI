# Builds a debug APK in the cloud (no Android Studio on your laptop).
# Repo → Settings → Secrets and variables → Actions → add NEXT_PUBLIC_API_URL (your Render API URL).

name: Build Android APK

on:
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses || true

      - name: Install missing Android SDK components
        run: $ANDROID_HOME/tools/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" || true

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Next.js static export + sync Capacitor
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          # Avoid downloading Google Fonts during build (often flaky on CI); see layout.tsx
          SKIP_GOOGLE_FONT_DOWNLOAD: "true"
        run: |
          npm run build
          npx cap sync android

      - name: Build debug APK
        working-directory: frontend/android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: transactai-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
